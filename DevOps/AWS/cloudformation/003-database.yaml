AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Image2Prompt AWS_003 Database. RDS PostgreSQL in the private subnets, reachable
  only from the service security group. After this stack is up, the AWS_003
  workflow patches the app secret with DATABASE_URL built from these outputs.

Parameters:
  DbInstanceClass:
    Type: String
    Default: db.t3.micro
  DbAllocatedStorage:
    Type: Number
    Default: 20
  DbName:
    Type: String
    Default: image2prompt
  DbUsername:
    Type: String
    Default: image2prompt
  DbPassword:
    Type: String
    NoEcho: true
    Default: image2prompt
    MinLength: 8

Resources:
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: img2pmpt private subnets
      SubnetIds: !Split [",", !ImportValue img2pmpt-PrivateSubnetIds]
      Tags: [{ Key: Name, Value: img2pmpt-db-subnets }]

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: img2pmpt-postgres
      Engine: postgres
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      StorageType: gp3
      DBName: !Ref DbName
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Ref DbPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [!ImportValue img2pmpt-DbSecurityGroupId]
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 1
      Tags: [{ Key: Name, Value: img2pmpt-postgres }]

Outputs:
  DbEndpoint:
    Value: !GetAtt DbInstance.Endpoint.Address
    Export: { Name: img2pmpt-DbEndpoint }
  DbPort:
    Value: !GetAtt DbInstance.Endpoint.Port
    Export: { Name: img2pmpt-DbPort }
  DbName:
    Value: !Ref DbName
    Export: { Name: img2pmpt-DbName }
