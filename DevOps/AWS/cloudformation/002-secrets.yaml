AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Image2Prompt AWS_002 Secrets. A single Secrets Manager secret holding the app
  config bundle (JSON of UPPERCASE env-name keys) that the CAF 'aws' provider
  reads at runtime. JWT_SECRET is generated; DATABASE_URL is added by the AWS_003
  database workflow once RDS exists. Provider API keys are optional (blank = that
  provider stays effectively disabled).

Parameters:
  SecretName:
    Type: String
    Default: "img2pmpt/app"
  AdminEmail:
    Type: String
    Default: "admin@image2prompt.io"
  AdminPassword:
    Type: String
    Default: "admin12345"
    NoEcho: true
  OpenAiApiKey:
    Type: String
    Default: ""
    NoEcho: true
  AnthropicApiKey:
    Type: String
    Default: ""
    NoEcho: true
  GoogleApiKey:
    Type: String
    Default: ""
    NoEcho: true
  AzureOpenAiEndpoint:
    Type: String
    Default: ""
  AzureOpenAiApiKey:
    Type: String
    Default: ""
    NoEcho: true
  AzureOpenAiDeployment:
    Type: String
    Default: "gpt-4o"

Resources:
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Image2Prompt application secret bundle (read via CAF aws provider)
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {
            "ADMIN_EMAIL": "${AdminEmail}",
            "ADMIN_PASSWORD": "${AdminPassword}",
            "OPENAI_API_KEY": "${OpenAiApiKey}",
            "ANTHROPIC_API_KEY": "${AnthropicApiKey}",
            "GOOGLE_API_KEY": "${GoogleApiKey}",
            "AZURE_OPENAI_ENDPOINT": "${AzureOpenAiEndpoint}",
            "AZURE_OPENAI_API_KEY": "${AzureOpenAiApiKey}",
            "AZURE_OPENAI_DEPLOYMENT": "${AzureOpenAiDeployment}"
          }
        GenerateStringKey: "JWT_SECRET"
        PasswordLength: 48
        ExcludePunctuation: true

Outputs:
  AppSecretArn:
    Value: !Ref AppSecret
    Export: { Name: img2pmpt-AppSecretArn }
  AppSecretName:
    Value: !Ref SecretName
    Export: { Name: img2pmpt-AppSecretName }
