AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Image2Prompt AWS_006 Portals. A single Fargate service (nginx) serving both
  Angular portals, registered into the portals target group created by AWS_005
  (the ALB default action). One task serves / (customer) and /admin/ (admin).

Parameters:
  ImageTag:
    Type: String
    Default: latest
  PortalsDesiredCount:
    Type: Number
    Default: 1
  TaskCpu:
    Type: String
    Default: "256"
  TaskMemory:
    Type: String
    Default: "512"
  CspConnectSrc:
    Type: String
    Default: "'self'"
    Description: >-
      CSP connect-src for the portals. Keep 'self' when the API is same-origin
      via the ALB; set to e.g. "'self' https://api.example.com" if the portals
      and gateway live on different domains.
  CspHeaderName:
    Type: String
    Default: Content-Security-Policy
    AllowedValues:
      - Content-Security-Policy
      - Content-Security-Policy-Report-Only
    Description: Use the Report-Only variant to roll out CSP without enforcing it.
  CspReportUri:
    Type: String
    Default: /api/csp-report
    Description: Where browsers POST CSP violation reports (gateway sink).
  HstsMaxAge:
    Type: String
    Default: "0"
    Description: >-
      Strict-Transport-Security max-age (seconds). 0 disables HSTS; set to
      31536000 once the portals are served over HTTPS (ALB/CloudFront TLS).

Resources:
  PortalsTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: img2pmpt-portals
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !ImportValue img2pmpt-ExecutionRoleArn
      TaskRoleArn: !ImportValue img2pmpt-TaskRoleArn
      ContainerDefinitions:
        - Name: portals
          Image: !Sub ["${Uri}:${ImageTag}", { Uri: !ImportValue img2pmpt-EcrUri-portals }]
          PortMappings: [{ ContainerPort: 80 }]
          Environment:
            - { Name: CSP_CONNECT_SRC, Value: !Ref CspConnectSrc }
            - { Name: CSP_HEADER_NAME, Value: !Ref CspHeaderName }
            - { Name: CSP_REPORT_URI, Value: !Ref CspReportUri }
            - { Name: HSTS_MAX_AGE, Value: !Ref HstsMaxAge }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !ImportValue img2pmpt-LogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: portals

  PortalsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: portals
      Cluster: !ImportValue img2pmpt-ClusterName
      LaunchType: FARGATE
      DesiredCount: !Ref PortalsDesiredCount
      TaskDefinition: !Ref PortalsTaskDef
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split [",", !ImportValue img2pmpt-PublicSubnetIds]
          SecurityGroups: [!ImportValue img2pmpt-ServiceSecurityGroupId]
      LoadBalancers:
        - ContainerName: portals
          ContainerPort: 80
          TargetGroupArn: !ImportValue img2pmpt-PortalsTargetGroupArn
