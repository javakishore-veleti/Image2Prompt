name: img2pmpt-grafana

# Dashboards (http://localhost:3000, anonymous admin). Datasources for Prometheus
# + Jaeger are provisioned from ./provisioning.
services:
  grafana:
    image: grafana/grafana:11.2.0
    container_name: img2pmpt-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks: [observability]

networks:
  observability:
    external: true
    name: img2pmpt-observability
