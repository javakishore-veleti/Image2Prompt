name: img2pmpt-prometheus

# Scrapes the collector's Prometheus endpoint (http://localhost:9090 UI).
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: img2pmpt-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [observability]

networks:
  observability:
    external: true
    name: img2pmpt-observability
