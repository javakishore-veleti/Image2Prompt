server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (mirror the gateway's API hardening for the static
    # portals). Set at server level so they apply to both SPAs below; neither
    # location defines its own add_header, so these are inherited. `always`
    # ensures they're sent on SPA fallback / error responses too.
    #
    # CSP for an Angular SPA served same-origin (the ALB routes /api/* to the
    # gateway, so connect-src 'self' covers API calls in prod):
    #   - style-src needs 'unsafe-inline' (Angular injects component styles)
    #   - img-src allows data:/blob: (image previews via URL.createObjectURL)
    #   - frame-ancestors 'none' + X-Frame-Options DENY: no embedding/clickjacking
    set $csp "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'";
    add_header Content-Security-Policy $csp always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Admin portal SPA at /admin/ (built with --base-href=/admin/)
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Customer portal SPA at /
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Note: /api/* is routed by the ALB to the gateway target group, not nginx.
}
