name: AWS_004_Destroy_Registry

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        default: us-east-1

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}
      - name: Delete registry stack (ECR repos emptied on delete)
        run: |
          aws cloudformation delete-stack --stack-name img2pmpt-registry
          aws cloudformation wait stack-delete-complete --stack-name img2pmpt-registry
