name: AWS_001_Setup_Network

# Manual only. Creates a new VPC (+2 public/2 private subnets) OR reuses an
# existing VPC when you provide its ID and subnet IDs.
on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        default: us-east-1
      existing_vpc_id:
        description: "Existing VPC ID to reuse (leave EMPTY to create a new VPC)"
        default: ""
      public_subnet_ids:
        description: "When reusing: 2 public subnet IDs, comma-separated"
        default: ""
      private_subnet_ids:
        description: "When reusing: 2 private subnet IDs, comma-separated"
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}
      - name: Deploy network stack
        run: |
          aws cloudformation deploy \
            --stack-name img2pmpt-network \
            --template-file DevOps/AWS/cloudformation/001-network.yaml \
            --parameter-overrides \
              ExistingVpcId="${{ inputs.existing_vpc_id }}" \
              ExistingPublicSubnetIds="${{ inputs.public_subnet_ids }}" \
              ExistingPrivateSubnetIds="${{ inputs.private_subnet_ids }}" \
            --no-fail-on-empty-changeset
