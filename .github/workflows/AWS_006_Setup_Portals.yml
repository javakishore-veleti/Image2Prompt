name: AWS_006_Setup_Portals

# Builds + pushes the portals image (both Angular apps in one nginx), then
# deploys the portals Fargate service into the ALB portals target group.
on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        default: us-east-1
      image_tag:
        description: Image tag to build and deploy
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build & push portals image
        env:
          TAG: ${{ inputs.image_tag }}
          REGION: ${{ inputs.aws_region }}
        run: |
          set -e
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REG="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com"
          docker build -f portals/Dockerfile -t "$REG/img2pmpt/portals:$TAG" .
          docker push "$REG/img2pmpt/portals:$TAG"
      - name: Deploy portals stack
        run: |
          aws cloudformation deploy \
            --stack-name img2pmpt-portals \
            --template-file DevOps/AWS/cloudformation/006-portals.yaml \
            --parameter-overrides ImageTag="${{ inputs.image_tag }}" \
            --no-fail-on-empty-changeset
