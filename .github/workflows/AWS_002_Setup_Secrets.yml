name: AWS_002_Setup_Secrets

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        default: us-east-1
      admin_email:
        description: Seed admin email
        default: admin@image2prompt.io
      admin_password:
        description: Seed admin password
        default: admin12345
      openai_api_key:
        description: OpenAI API key (optional)
        default: ""
      anthropic_api_key:
        description: Anthropic API key (optional)
        default: ""
      google_api_key:
        description: Google (Gemini) API key (optional)
        default: ""
      azure_openai_endpoint:
        description: Azure OpenAI endpoint (optional)
        default: ""
      azure_openai_api_key:
        description: Azure OpenAI API key (optional)
        default: ""
      azure_openai_deployment:
        description: Azure OpenAI deployment name
        default: gpt-4o

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}
      - name: Deploy secrets stack
        run: |
          aws cloudformation deploy \
            --stack-name img2pmpt-secrets \
            --template-file DevOps/AWS/cloudformation/002-secrets.yaml \
            --parameter-overrides \
              AdminEmail="${{ inputs.admin_email }}" \
              AdminPassword="${{ inputs.admin_password }}" \
              OpenAiApiKey="${{ inputs.openai_api_key }}" \
              AnthropicApiKey="${{ inputs.anthropic_api_key }}" \
              GoogleApiKey="${{ inputs.google_api_key }}" \
              AzureOpenAiEndpoint="${{ inputs.azure_openai_endpoint }}" \
              AzureOpenAiApiKey="${{ inputs.azure_openai_api_key }}" \
              AzureOpenAiDeployment="${{ inputs.azure_openai_deployment }}" \
            --no-fail-on-empty-changeset
