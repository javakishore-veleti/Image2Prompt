name: AWS_002_Setup_Secrets

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        default: us-east-1
      admin_email:
        description: Seed admin email
        default: admin@image2prompt.io
      admin_password:
        description: Seed admin password
        default: admin12345

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}
      - name: Deploy secrets stack
        run: |
          aws cloudformation deploy \
            --stack-name img2pmpt-secrets \
            --template-file DevOps/AWS/cloudformation/002-secrets.yaml \
            --parameter-overrides \
              AdminEmail="${{ inputs.admin_email }}" \
              AdminPassword="${{ inputs.admin_password }}" \
            --no-fail-on-empty-changeset
