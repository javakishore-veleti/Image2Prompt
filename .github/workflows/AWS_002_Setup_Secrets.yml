name: AWS_002_Setup_Secrets

# Creates the app secret (JWT generated), then patches any provided AI provider
# keys into it via the CLI — keys are NEVER passed as CloudFormation parameters,
# so they don't appear in stack/parameter history.
on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        default: us-east-1
      admin_email:
        description: Seed admin email
        default: admin@image2prompt.io
      admin_password:
        description: Seed admin password
        default: admin12345
      openai_api_key:
        description: OpenAI API key (optional)
        default: ""
      anthropic_api_key:
        description: Anthropic API key (optional)
        default: ""
      google_api_key:
        description: Google (Gemini) API key (optional)
        default: ""
      azure_openai_endpoint:
        description: Azure OpenAI endpoint (optional)
        default: ""
      azure_openai_api_key:
        description: Azure OpenAI API key (optional)
        default: ""
      azure_openai_deployment:
        description: Azure OpenAI deployment name (optional)
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}
      - name: Deploy secrets stack
        run: |
          aws cloudformation deploy \
            --stack-name img2pmpt-secrets \
            --template-file DevOps/AWS/cloudformation/002-secrets.yaml \
            --parameter-overrides \
              AdminEmail="${{ inputs.admin_email }}" \
              AdminPassword="${{ inputs.admin_password }}" \
            --no-fail-on-empty-changeset
      - name: Patch provider keys into secret (non-empty only)
        env:
          OPENAI_API_KEY: ${{ inputs.openai_api_key }}
          ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
          GOOGLE_API_KEY: ${{ inputs.google_api_key }}
          AZURE_OPENAI_ENDPOINT: ${{ inputs.azure_openai_endpoint }}
          AZURE_OPENAI_API_KEY: ${{ inputs.azure_openai_api_key }}
          AZURE_OPENAI_DEPLOYMENT: ${{ inputs.azure_openai_deployment }}
        run: |
          set -e
          CUR=$(aws secretsmanager get-secret-value --secret-id img2pmpt/app --query SecretString --output text)
          echo "$CUR" | jq \
            --arg OPENAI_API_KEY "$OPENAI_API_KEY" \
            --arg ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY" \
            --arg GOOGLE_API_KEY "$GOOGLE_API_KEY" \
            --arg AZURE_OPENAI_ENDPOINT "$AZURE_OPENAI_ENDPOINT" \
            --arg AZURE_OPENAI_API_KEY "$AZURE_OPENAI_API_KEY" \
            --arg AZURE_OPENAI_DEPLOYMENT "$AZURE_OPENAI_DEPLOYMENT" '
            reduce ({OPENAI_API_KEY:$OPENAI_API_KEY, ANTHROPIC_API_KEY:$ANTHROPIC_API_KEY,
                     GOOGLE_API_KEY:$GOOGLE_API_KEY, AZURE_OPENAI_ENDPOINT:$AZURE_OPENAI_ENDPOINT,
                     AZURE_OPENAI_API_KEY:$AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT:$AZURE_OPENAI_DEPLOYMENT}
                    | to_entries[]) as $kv (.; if $kv.value != "" then . + {($kv.key): $kv.value} else . end)
          ' > /tmp/secret.json
          aws secretsmanager put-secret-value --secret-id img2pmpt/app --secret-string file:///tmp/secret.json
          echo "Provider keys patched (non-empty only)."
