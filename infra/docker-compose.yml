name: image2prompt

# Build context is the repo root (../) so each service image can install the
# local shared library from services/shared.
x-build: &python-build
  context: ..
  args:
    PIP_NO_CACHE_DIR: "1"

x-common-env: &common-env
  JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
  ADMIN_SERVICE_URL: http://admin-service:8001
  CUSTOMER_SERVICE_URL: http://customer-service:8002
  AI_ADAPTERS_URL: http://ai-adapters:8003
  IMAGE_SERVICE_URL: http://image-processing-service:8004
  GATEWAY_URL: http://gateway:8000
  CORS_ORIGINS: http://localhost:4200,http://localhost:4300

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-image2prompt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-image2prompt}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-image2prompt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin-service:
    build:
      <<: *python-build
      dockerfile: services/admin-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-image2prompt}:${POSTGRES_PASSWORD:-image2prompt}@postgres:5432/admin_service
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@image2prompt.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  customer-service:
    build:
      <<: *python-build
      dockerfile: services/customer-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-image2prompt}:${POSTGRES_PASSWORD:-image2prompt}@postgres:5432/customer_service
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  ai-adapters:
    build:
      <<: *python-build
      dockerfile: services/ai-adapters/Dockerfile
    environment:
      <<: *common-env
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-sonnet-20240229-v1:0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8003:8003"

  image-processing-service:
    build:
      <<: *python-build
      dockerfile: services/image-processing-service/Dockerfile
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-image2prompt}:${POSTGRES_PASSWORD:-image2prompt}@postgres:5432/image_service
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_DIR: ${LOCAL_STORAGE_DIR:-/data/uploads}
    ports:
      - "8004:8004"
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      <<: *python-build
      dockerfile: services/gateway/Dockerfile
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    depends_on:
      - admin-service
      - customer-service
      - image-processing-service

volumes:
  pgdata:
  uploads:
